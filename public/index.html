<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wortwolke</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="presenter-body">

  <!-- Pre-live overlay -->
  <div id="prelive-overlay">
    <div id="prelive-content">
      <div class="prelive-dot"></div>
      <h2>Sitzung noch nicht gestartet</h2>
      <p>Der Admin startet die Sitzung gleich</p>
    </div>
  </div>

  <!-- Word cloud canvas -->
  <div id="cloud-container">
    <svg id="cloud-svg"></svg>
    <div id="empty-state">
      <p>Warte auf Antworten...</p>
      <span>Teilnehmer können den QR-Code scannen</span>
    </div>
  </div>

  <!-- QR code panel -->
  <div id="qr-panel">
    <div id="qr-box" onclick="openQRFullscreen()">
      <div id="qr-code"></div>
      <p id="qr-label">Scannen zum Mitmachen</p>
      <span id="qr-hint">Klicken zum Vergrößern</span>
    </div>
    <div id="word-count-badge">
      <span id="word-count">0</span>
      <small>Antworten</small>
    </div>
  </div>

  <!-- QR fullscreen overlay -->
  <div id="qr-overlay" onclick="closeQRFullscreen()">
    <div id="qr-overlay-box">
      <div id="qr-overlay-code"></div>
      <p id="qr-overlay-url"></p>
      <span>Tippen zum Schließen</span>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-cloud/1.2.5/d3.layout.cloud.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="presenter.js"></script>
</body>
</html>
